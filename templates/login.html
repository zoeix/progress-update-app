<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ClickUp 設定</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --panel: #ffffff;
        --text: #1f2328;
        --muted: #667085;
        --line: #d9dee7;
        --accent: #1f4e79;
        --accent-hover: #183d5f;
        --danger: #b42318;
        --danger-bg: #fff4f2;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.5;
      }

      .shell {
        width: min(640px, calc(100vw - 32px));
        margin: 40px auto;
      }

      header {
        margin-bottom: 18px;
      }

      h1,
      p {
        margin-top: 0;
      }

      h1 {
        margin-bottom: 0;
        font-size: 28px;
        font-weight: 650;
        line-height: 1.15;
        letter-spacing: 0;
      }

      .muted {
        color: var(--muted);
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 20px;
        box-shadow: 0 1px 2px rgba(16, 24, 40, 0.04);
      }

      .error {
        margin-bottom: 18px;
        padding: 12px 14px;
        border: 1px solid #fecdca;
        border-radius: 6px;
        background: var(--danger-bg);
        color: var(--danger);
      }

      label {
        display: block;
        margin: 16px 0 6px;
        color: #344054;
        font-size: 13px;
        font-weight: 650;
      }

      label:first-child {
        margin-top: 0;
      }

      input {
        width: 100%;
        min-height: 40px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 8px 10px;
        font: inherit;
        color: var(--text);
        background: #ffffff;
      }

      input:focus {
        border-color: var(--accent);
        outline: 3px solid rgba(31, 78, 121, 0.14);
        outline-offset: 2px;
      }

      button {
        margin-top: 18px;
        border: 1px solid var(--accent);
        border-radius: 6px;
        background: var(--accent);
        color: #ffffff;
        padding: 8px 14px;
        font: inherit;
        font-weight: 650;
        cursor: pointer;
      }

      button:hover:not(:disabled) {
        background: var(--accent-hover);
        border-color: var(--accent-hover);
      }

      button:disabled {
        cursor: wait;
        opacity: 0.72;
      }

      .secondary-button {
        border: 1px solid var(--line);
        background: var(--panel);
        color: var(--text);
      }

      .secondary-button:hover:not(:disabled) {
        background: #f9fafb;
        border-color: #c8ced8;
      }

      .finish-form {
        margin-top: 12px;
      }

      .submit-status {
        display: none;
        margin-top: 12px;
        color: var(--muted);
      }

      form.is-submitting .submit-status {
        display: block;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header>
        <h1>ClickUp 設定</h1>
      </header>

      {% if error %}
        <div class="error">{{ error }}</div>
      {% endif %}

      <section class="panel">
        <form action="/login" method="post">
          <label for="clickup_token">CLICKUP_TOKEN</label>
          <input id="clickup_token" name="clickup_token" type="password" autocomplete="off" value="{{ clickup_token }}" required>

          <label for="clickup_list_id">CLICKUP_LIST_ID</label>
          <input id="clickup_list_id" name="clickup_list_id" type="text" autocomplete="off" value="{{ clickup_list_id }}" required>

          <label for="codex_bin">CODEX_BIN（選填）</label>
          <input id="codex_bin" name="codex_bin" type="text" autocomplete="off" value="{{ codex_bin }}" placeholder="例如 C:\Users\...\AppData\Roaming\npm\codex.cmd">
          <p class="muted">找得到 Codex 時會自動帶入；留空則使用系統 PATH 的 codex。</p>

          <button type="submit">確認連線</button>
          <div class="submit-status" aria-live="polite">正在確認 ClickUp 連線並下載專案清單...</div>
        </form>
        <form class="finish-form" action="/finish" method="post" data-confirm="確定要重設目前進度並結束服務嗎？">
          <button class="secondary-button" type="submit">結束</button>
          <div class="submit-status" aria-live="polite">正在重設進度並結束服務，請稍候...</div>
        </form>
      </section>
    </main>
    <script>
      document.querySelectorAll("form").forEach((form) => {
        form.addEventListener("submit", (event) => {
          const message = form.dataset.confirm;
          if (message && !window.confirm(message)) {
            event.preventDefault();
            return;
          }
          form.classList.add("is-submitting");
          const status = form.querySelector(".submit-status");
          if (status && form.action.endsWith("/finish")) {
            status.textContent = "正在重設進度並結束服務，請稍候...";
          }
          form.querySelectorAll("button").forEach((button) => {
            button.disabled = true;
            button.textContent = "處理中...";
          });
        });
      });
    </script>
  </body>
</html>
